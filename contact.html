<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our First Github Project</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <section id="contact">
        <article class="contact-wrapper">
            <main class="contact-holder">
    <div class="contact-holder1">
          <h2>Contact Me</h2>
           </div>
           <div class="contact-holder2">
        <p>Get in touch with me!</p>
        </div>
        </main>
          <!-- </article> -->

        <article class="contact-content">
            <main class="contact-content-wrapper">
            <div class="contact-form">
                <!-- <form> -->
                    <div class="form-group">
                        <label class="name">Name</label>
                        <input type="text" placeholder="" class="form-name">
                    </div>

                    <div class="form-group1">
                        <label for="email">Email</label>
                         <input type="email" placeholder="" class="form-email">
                    </div>

                    <div class="form-group2">
                        <label for="message">Message</label>
                        <input type="message" placeholder="" class="form-message">
                    </div>
                    <div class="form-btn">
                    <button class="submit">Send Message</button>
                    </div>
                <!-- </form> -->
            </div>

            <!-- Contact Information -->
            <div class="contact-info">
                <div class="contact-info1">
                <h3 class="contact-info1Text1">Contact Information</h3>
                <p class="contact-info1Text2">📧 taiwo.best@example.com</p>
                <p class="contact-info1Text3">📞 +234-896-6754</p>
                <p class="contact-info1Text4">📍 Location: City, State</p>
                    </div>
                <div class="map">
                    <div class="contact-info2">
                        <img src="https://www.alamy.com/a-generic-city-map-with-icons-image424653168.html" alt="">
                    </div>

                    <!-- <iframe 
                        src="https://maps.google.com/embed?pb=Aguda%20Community%20Senior%20Secondary%20School&t=&z=13&ie=UTF8&iwloc=&output=embed""
                        width="600" 
                        height="450" 
                        style="border:0;"
                        allowfullscreen="" 
                        loading="lazy">
                    </iframe> -->
                </div>
            </div>
            </main>
        </article>
    </article>
</section>

</body>
</html>
